<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DOGY Virtual Pet - Virtual Pet Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Helvetica, Arial, Roboto, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            background-color: #000;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .scratch-embed {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(142deg, rgba(61, 99, 205, .5), rgba(100, 36, 219, .5)), rgba(0, 0, 0, .7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
        }

        .loading-title {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .loading-subtitle {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .play-button {
            background: none;
            border: none;
            cursor: pointer;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .play-button:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .play-icon {
            width: 60px;
            height: 60px;
        }

        .play-text {
            font-size: 1.2em;
            font-weight: bold;
        }

        .background-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(10px);
            z-index: -1;
        }

        @media (max-width: 768px) {
            .loading-title {
                font-size: 2em;
            }
            .loading-subtitle {
                font-size: 1em;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="loading-screen" id="loadingScreen">
            <img class="background-img" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjQyIiBoZWlnaHQ9IjEzOCIgdmlld0JveD0iMCAwIDI0MiAxMzgiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIyNDIiIGhlaWdodD0iMTM4IiBmaWxsPSJ1cmwoI2dyYWRpZW50KSIvPgo8ZGVmcz4KPGxpbmVhckdyYWRpZW50IGlkPSJncmFkaWVudCIgeDI9IjEiPgo8c3RvcCBvZmZzZXQ9IjAiIHN0b3AtY29sb3I9IiM2QjQ2QzEiLz4KPHN0b3Agb2Zmc2V0PSIxIiBzdG9wLWNvbG9yPSIjOUMzNkY2Ii8+CjwvbGluZWFyR3JhZGllbnQ+CjwvZGVmcz4KPC9zdmc+" alt="Background">
            <h1 class="loading-title">My DOGY Virtual Pet</h1>
            <p class="loading-subtitle">Take care of your virtual dog</p>
            <button class="play-button" onclick="startGame()" id="playButton">
                <svg class="play-icon" width="60" height="60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M30 1.25C16.456 1.25 6.25 11.456 6.25 24S16.456 46.75 30 46.75 53.75 36.544 53.75 24 43.544 1.25 30 1.25Zm8.178 24.767L26.66 33.58a1.179 1.179 0 0 1-1.785-1.018V17.44a1.178 1.178 0 0 1 1.785-1.018l12.518 7.562a1.19 1.19 0 0 1 0 2.034Z" fill="#fff"></path>
                </svg>
                <span class="play-text">Play Now</span>
            </button>
        </div>
        
        <iframe 
            class="scratch-embed" 
            id="gameFrame"
            src="https://html5.gamedistribution.com/0aa201caffd44d389a6e4fd64de06306/?gd_sdk_referrer_url=https://takecareofshadowmilk.org/my-dogy-virtual-pet.embed"
            allowfullscreen="true" 
            webkitallowfullscreen="true" 
            mozallowfullscreen="true"
            allowtransparency="true"
            frameborder="0"
            scrolling="no"
            style="display: none;">
        </iframe>
    </div>

    <script>
        function startGame() {
            const loadingScreen = document.getElementById('loadingScreen');
            const gameFrame = document.getElementById('gameFrame');
            const playButton = document.getElementById('playButton');
            
            playButton.innerHTML = `
                <svg class="play-icon" width="60" height="60" viewBox="0 0 24 24" fill="white">
                    <path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10a10 10 0 0 0 10-10A10 10 0 0 0 12 2M12 4a8 8 0 0 1 8 8a8 8 0 0 1-8 8a8 8 0 0 1-8-8a8 8 0 0 1 8-8m0 2a6 6 0 0 0-6 6a6 6 0 0 0 6 6a6 6 0 0 0 6-6a6 6 0 0 0-6-6m0 2a4 4 0 0 1 4 4a4 4 0 0 1-4 4a4 4 0 0 1-4-4a4 4 0 0 1 4-4z"/>
                    <animateTransform attributeName="transform" type="rotate" values="0 12 12;360 12 12" dur="1s" repeatCount="indefinite"/>
                </svg>
                <span class="play-text">Loading...</span>
            `;
            
            playButton.disabled = true;
            
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.transition = 'opacity 0.5s ease';
                
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    gameFrame.style.display = 'block';
                }, 500);
            }, 1500);
        }

        if (window.innerWidth <= 768) {
            setTimeout(() => {
                if (document.getElementById('loadingScreen').style.display !== 'none') {
                    startGame();
                }
            }, 3000);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F11') {
                e.preventDefault();
                toggleFullscreen();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.getElementById('gameFrame').addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
