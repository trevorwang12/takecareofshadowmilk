<html lang="en">

    <title>My Pet Care Salon - Virtual Pet Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Helvetica, Arial, Roboto, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            background-color: #000;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .scratch-embed {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(142deg, rgba(61, 99, 205, .5), rgba(100, 36, 219, .5)), rgba(0, 0, 0, .7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
        }

        .loading-title {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .loading-subtitle {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .play-button {
            background: none;
            border: none;
            cursor: pointer;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .play-button:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .play-icon {
            width: 60px;
            height: 60px;
        }

        .play-text {
            font-size: 1.2em;
            font-weight: bold;
        }

        .background-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(10px);
            z-index: -1;
        }

        @media (max-width: 768px) {
            .loading-title {
                font-size: 2em;
            }
            .loading-subtitle {
                font-size: 1em;
                padding: 0 20px;
            }
        }
    </style>
</head>

    <script>
        function startGame() {
            const loadingScreen = document.getElementById('loadingScreen');
            const gameFrame = document.getElementById('gameFrame');
            const playButton = document.getElementById('playButton');
            
            playButton.innerHTML = `
                <svg class="play-icon" width="60" height="60" viewBox="0 0 24 24" fill="white">
                    <path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10a10 10 0 0 0 10-10A10 10 0 0 0 12 2M12 4a8 8 0 0 1 8 8a8 8 0 0 1-8 8a8 8 0 0 1-8-8a8 8 0 0 1 8-8m0 2a6 6 0 0 0-6 6a6 6 0 0 0 6 6a6 6 0 0 0 6-6a6 6 0 0 0-6-6m0 2a4 4 0 0 1 4 4a4 4 0 0 1-4 4a4 4 0 0 1-4-4a4 4 0 0 1 4-4z"/>
                    <animateTransform attributeName="transform" type="rotate" values="0 12 12;360 12 12" dur="1s" repeatCount="indefinite"/>
                </svg>
                <span class="play-text">Loading...</span>
            `;
            
            playButton.disabled = true;
            
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.transition = 'opacity 0.5s ease';
                
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    gameFrame.style.display = 'block';
                }, 500);
            }, 1500);
        }

        if (window.innerWidth <= 768) {
            setTimeout(() => {
                if (document.getElementById('loadingScreen').style.display !== 'none') {
                    startGame();
                }
            }, 3000);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F11') {
                e.preventDefault();
                toggleFullscreen();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.getElementById('gameFrame').addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    </script>
