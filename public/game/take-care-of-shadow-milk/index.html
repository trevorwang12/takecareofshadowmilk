    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Helvetica, Arial, Roboto, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            background-color: #000;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .scratch-embed {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(142deg, rgba(61, 99, 205, .5), rgba(100, 36, 219, .5)), rgba(0, 0, 0, .7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
        }

        .loading-title {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .loading-subtitle {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .play-button {
            background: none;
            border: none;
            cursor: pointer;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .play-button:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .play-icon {
            width: 60px;
            height: 60px;
        }

        .play-text {
            font-size: 1.2em;
            font-weight: bold;
        }

        .background-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(10px);
            z-index: -1;
        }

        @media (max-width: 768px) {
            .loading-title {
                font-size: 2em;
            }
            .loading-subtitle {
                font-size: 1em;
                padding: 0 20px;
            }
        }
    </style>
</head>

    <script>
        function startGame() {
            const loadingScreen = document.getElementById('loadingScreen');
            const gameFrame = document.getElementById('gameFrame');
            const playButton = document.getElementById('playButton');
            
            // Show loading animation
            playButton.innerHTML = `
                <svg class="play-icon" width="60" height="60" viewBox="0 0 24 24" fill="white">
                    <path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10a10 10 0 0 0 10-10A10 10 0 0 0 12 2M12 4a8 8 0 0 1 8 8a8 8 0 0 1-8 8a8 8 0 0 1-8-8a8 8 0 0 1 8-8m0 2a6 6 0 0 0-6 6a6 6 0 0 0 6 6a6 6 0 0 0 6-6a6 6 0 0 0-6-6m0 2a4 4 0 0 1 4 4a4 4 0 0 1-4 4a4 4 0 0 1-4-4a4 4 0 0 1 4-4z"/>
                    <animateTransform attributeName="transform" type="rotate" values="0 12 12;360 12 12" dur="1s" repeatCount="indefinite"/>
                </svg>
                <span class="play-text">Loading...</span>
            `;
            
            playButton.disabled = true;
            
            // Show game frame immediately to start loading
            gameFrame.style.display = 'block';
            
            // Add error handling for iframe loading
            gameFrame.onload = function() {
                console.log('Game loaded successfully');
                setTimeout(() => {
                    hideLoadingScreen();
                }, 1000);
            };
            
            gameFrame.onerror = function() {
                console.log('Game loading failed, showing error message');
                showErrorMessage();
            };
            
            // Extended fallback timeout for loading
            setTimeout(() => {
                if (loadingScreen.style.display !== 'none') {
                    hideLoadingScreen();
                }
            }, 5000);
        }
        
        function hideLoadingScreen() {
            const loadingScreen = document.getElementById('loadingScreen');
            const gameFrame = document.getElementById('gameFrame');
            
            loadingScreen.style.opacity = '0';
            loadingScreen.style.transition = 'opacity 0.5s ease';
            
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                gameFrame.style.display = 'block';
            }, 500);
        }

        // Auto-play on mobile after 3 seconds
        if (window.innerWidth <= 768) {
            setTimeout(() => {
                if (document.getElementById('loadingScreen').style.display !== 'none') {
                    startGame();
                }
            }, 3000);
        }

        // Handle fullscreen
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F11') {
                e.preventDefault();
                toggleFullscreen();
            }
        });

        // Handle postMessage errors
        window.addEventListener('message', function(event) {
            // Only handle messages from Scratch
            if (event.origin !== 'https://scratch.mit.edu') {
                return;
            }
            
            try {
                // Handle Scratch iframe messages safely
                if (event.data && typeof event.data === 'object') {
                    // Process message if needed
                }
            } catch (error) {
                // Silently handle postMessage errors
                console.debug('PostMessage handled:', error);
            }
        });

        // Comprehensive error suppression for Scratch platform
        const originalError = console.error;
        const originalWarn = console.warn;
        
        // Suppress common Scratch/iframe errors
        console.error = function(...args) {
            const message = args.join(' ');
            if (message.includes('Failed to read the \'cookie\'') ||
                message.includes('sandboxed') ||
                message.includes('postMessage') ||
                message.includes('target origin') ||
                message.includes('SecurityError')) {
                return; // Suppress these errors
            }
            originalError.apply(console, args);
        };
        
        console.warn = function(...args) {
            const message = args.join(' ');
            if (message.includes('sandbox') ||
                message.includes('allow-same-origin') ||
                message.includes('escape its sandboxing')) {
                return; // Suppress these warnings
            }
            originalWarn.apply(console, args);
        };

        // Suppress JavaScript errors
        window.addEventListener('error', function(e) {
            if (e.message && (
                e.message.includes('has already been declared') ||
                e.message.includes('Failed to read the \'cookie\'') ||
                e.message.includes('SecurityError') ||
                e.message.includes('sandboxed')
            )) {
                e.preventDefault();
                return false;
            }
        });

        // Suppress unhandled promise rejections
        window.addEventListener('unhandledrejection', function(e) {
            if (e.reason && (
                e.reason.message.includes('cookie') ||
                e.reason.message.includes('SecurityError') ||
                e.reason.message.includes('sandboxed')
            )) {
                e.preventDefault();
                return false;
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Prevent context menu on game
        document.getElementById('gameFrame').addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
